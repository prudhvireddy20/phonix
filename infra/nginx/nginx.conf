worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # ── Security headers (applied to every response) ──────────────────────
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin"     always;
    add_header Permissions-Policy        "microphone=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Upstream services ─────────────────────────────────────────────────
    upstream frontend { server frontend:3000; }
    upstream api      { server api:8000; }
    upstream minio    { server minio:9000; }

    # ── HTTPS server blocks (uncomment when TLS certs are available) ─────
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }
    #
    # server {
    #     listen 443 ssl;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     client_max_body_size 55m;
    #
    #     location /api/ {
    #         proxy_pass         http://api/api/;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto $scheme;
    #         proxy_set_header   Connection        "";
    #         proxy_buffering    off;
    #         proxy_cache        off;
    #         proxy_read_timeout 120s;
    #     }
    #     location /health {
    #         proxy_pass       http://api/health;
    #         proxy_set_header Host $host;
    #     }
    #     location /storage/ {
    #         proxy_pass         http://minio/;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Host              minio:9000;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         client_max_body_size 55m;
    #         proxy_request_buffering off;
    #     }
    #     location / {
    #         proxy_pass         http://frontend;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   Upgrade           $http_upgrade;
    #         proxy_set_header   Connection        "upgrade";
    #     }
    # }

    # ── Dev-only: plain HTTP (no TLS certs required) ─────────────────────
    server {
        listen 80;
        server_name _;
        client_max_body_size 55m;

        location /api/ {
            proxy_pass       http://api/api/;
            proxy_buffering  off;
            proxy_cache      off;
            proxy_read_timeout 120s;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /health {
            proxy_pass http://api/health;
        }
        location /storage/ {
            proxy_pass               http://minio/;
            proxy_set_header         Host minio:9000;
            client_max_body_size     55m;
            proxy_request_buffering  off;
        }
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
